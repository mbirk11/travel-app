{% extends 'base.html' %}

{% block title %}Delete Trip | Wanderlust{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <div class="glass-card">
        <div style="color: #ef4444; margin-bottom: 1.5rem;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        </div>
        <h2 style="margin-bottom: 1rem;">Delete Trip?</h2>
        <p style="color: var(--text-light); margin-bottom: 2rem; line-height: 1.6;">
            Are you sure you want to delete the trip <strong>"{{ trip.title }}"</strong>? This action cannot be undone.
        </p>

        <form method="POST">
            {% csrf_token %}
            <div style="display: flex; justify-content: center; gap: 1rem;">
                <a href="{% url 'trip_detail' trip.pk %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-danger">Yes, Delete Trip</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
